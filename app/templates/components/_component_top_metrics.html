<div class="row g-3 mb-4">
    <div class="col-md-4">
        <div class="card h-100 border-0 shadow-sm" style="background: linear-gradient(145deg, #1e1e1e, #161616); border-left: 4px solid #0d6efd !important;">
            <div class="card-body d-flex align-items-center gap-3">
                <div class="rounded-pill bg-primary bg-opacity-10 p-3 d-flex align-items-center justify-content-center">
                    <i class="bi bi-boxes text-primary fs-4"></i>
                </div>
                <div>
                    <h6 class="text-white-50 small mb-1 uppercase tracking-wider">Total de Unidades</h6>
                    <h4 class="mb-0 fw-bold">{{ component_metrics.total_quantity }}</h4>
                </div>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card h-100 border-0 shadow-sm" style="background: linear-gradient(145deg, #1e1e1e, #161616); border-left: 4px solid #198754 !important;">
            <div class="card-body d-flex align-items-center gap-3">
                <div class="rounded-pill bg-success bg-opacity-10 p-3 d-flex align-items-center justify-content-center">
                    <i class="bi bi-currency-dollar text-success fs-4"></i>
                </div>
                <div>
                    <h6 class="text-white-50 small mb-1 uppercase tracking-wider">Valor em Estoque</h6>
                    <h4 class="mb-0 fw-bold">R$ {{ component_metrics.total_price }}</h4>
                </div>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card h-100 border-0 shadow-sm" style="background: linear-gradient(145deg, #1e1e1e, #161616); border-left: 4px solid #ffc107 !important;">
            <div class="card-body d-flex align-items-center gap-3">
                <div class="rounded-pill bg-warning bg-opacity-10 p-3 d-flex align-items-center justify-content-center">
                    <i class="bi bi-cpu text-warning fs-4"></i>
                </div>
                <div>
                    <h6 class="text-white-50 small mb-1 uppercase tracking-wider">Tipos de Componentes</h6>
                    <h4 class="mb-0 fw-bold">{{ component_metrics.component_count }}</h4>
                </div>
            </div>
        </div>
    </div>
</div>
