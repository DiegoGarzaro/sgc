<div class="row g-4 mb-4">
  <!-- Total Quantity -->
  <div class="col-sm-6 col-xl-4">
    <div class="card border-0 h-100 metric-card">
      <div class="card-body p-4">
        <div class="d-flex align-items-start justify-content-between mb-4">
          <div class="rounded-3 p-3" style="background: rgba(13,110,253,0.12);">
            <i class="bi bi-boxes text-primary fs-4"></i>
          </div>
          <span class="badge bg-primary bg-opacity-10 text-primary border border-primary border-opacity-25 fw-normal small">Estoque</span>
        </div>
        <p class="text-secondary small text-uppercase fw-semibold mb-1 ls-1">Quantidade Total</p>
        <h2 class="fw-bold mb-0 display-6">{{ component_metrics.total_quantity }}</h2>
        <p class="text-secondary small mt-2 mb-0">unidades em inventário</p>
      </div>
      <div class="metric-accent" style="background: #0d6efd;"></div>
    </div>
  </div>

  <!-- Total Value -->
  <div class="col-sm-6 col-xl-4">
    <div class="card border-0 h-100 metric-card">
      <div class="card-body p-4">
        <div class="d-flex align-items-start justify-content-between mb-4">
          <div class="rounded-3 p-3" style="background: rgba(25,135,84,0.12);">
            <i class="bi bi-currency-dollar text-success fs-4"></i>
          </div>
          <span class="badge bg-success bg-opacity-10 text-success border border-success border-opacity-25 fw-normal small">Financeiro</span>
        </div>
        <p class="text-secondary small text-uppercase fw-semibold mb-1 ls-1">Valor em Estoque</p>
        <h2 class="fw-bold mb-0 display-6">R$&nbsp;{{ component_metrics.total_price }}</h2>
        <p class="text-secondary small mt-2 mb-0">valor total estimado</p>
      </div>
      <div class="metric-accent" style="background: #198754;"></div>
    </div>
  </div>

  <!-- Component Types -->
  <div class="col-sm-6 col-xl-4">
    <div class="card border-0 h-100 metric-card">
      <div class="card-body p-4">
        <div class="d-flex align-items-start justify-content-between mb-4">
          <div class="rounded-3 p-3" style="background: rgba(255,193,7,0.12);">
            <i class="bi bi-cpu text-warning fs-4"></i>
          </div>
          <span class="badge bg-warning bg-opacity-10 text-warning border border-warning border-opacity-25 fw-normal small">Catálogo</span>
        </div>
        <p class="text-secondary small text-uppercase fw-semibold mb-1 ls-1">Tipos Cadastrados</p>
        <h2 class="fw-bold mb-0 display-6">{{ component_metrics.component_count }}</h2>
        <p class="text-secondary small mt-2 mb-0">componentes distintos</p>
      </div>
      <div class="metric-accent" style="background: #ffc107;"></div>
    </div>
  </div>
</div>

<style>
  .metric-card {
    position: relative;
    overflow: hidden;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .metric-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 28px rgba(0,0,0,0.35) !important;
  }
  .metric-accent {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    opacity: 0.7;
  }
  .ls-1 { letter-spacing: 0.05em; }
</style>
