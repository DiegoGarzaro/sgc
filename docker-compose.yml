services:
  web:
    build: .
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://sgc:sgc@db:5432/sgc
      MEDIA_ROOT: /app/media
    volumes:
      - media:/app/media
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sgc
      POSTGRES_USER: sgc
      POSTGRES_PASSWORD: sgc
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sgc"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  media:
  postgres_data:
